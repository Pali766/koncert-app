<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poharas felület</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Poharas felület</h1>
</header>

<main>
    <div id="requests" class="selected-list">
        <h2>Beérkező italok:</h2>
        <ul id="requestList"></ul>
    </div>
</main>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://bvfdbcuxaanrkkehqwgs.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yAzrw6aLWH_ykwCbzpmuhg_GhHkAyPw";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const listEl = document.getElementById("requestList");

    function addOrderToList(order) {
        const li = document.createElement("li");
        li.textContent = `${order.drink} (${order.qty})`;
        listEl.appendChild(li);
    }

    async function loadInitialOrders() {
        const { data, error } = await supabase
            .from("orders")
            .select("*")
            .order("id", { ascending: true });

        if (!error && data) {
            data.forEach(addOrderToList);
        }
    }

    // Realtime figyelés
    supabase
        .channel("orders-realtime")
        .on(
            "postgres_changes",
            { event: "INSERT", schema: "public", table: "orders" },
            (payload) => addOrderToList(payload.new)
        )
        .subscribe();

    loadInitialOrders();
</script>

</body>
</html>
