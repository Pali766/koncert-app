<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pultos – Italkérés</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="container">
    <h1>Pultos – Italkérés</h1>
    <a class="back" href="index.html">Vissza</a>
  </header>

  <main class="container">
    <section class="card">
      <h2>Ital hozzáadása üzenethez</h2>
      <div class="form-row">
        <input id="searchDrink" placeholder="Ital keresése" />
        <input id="qty" type="number" min="1" value="1" />
        <button id="addToListBtn">Hozzáad</button>
      </div>
      <ul id="orderList"></ul>
      <button id="sendOrderBtn">Küldés poharasoknak</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="pultos.js"></script>
</body>
</html>
