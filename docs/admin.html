<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin – Italkezelés</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="container">
    <h1>Admin – Italkezelés</h1>
    <a class="back" href="index.html">Vissza</a>
  </header>

  <main class="container">
    <section class="card">
      <h2>Új ital hozzáadása</h2>
      <div class="form-row">
        <input id="drinkName" placeholder="Ital neve" />
        <button id="addDrinkBtn">Hozzáadás</button>
      </div>
    </section>

    <section class="card">
      <h2>Italok listája</h2>
      <table class="table">
        <thead>
          <tr><th>Név</th><th>Aktív</th><th>Műveletek</th></tr>
        </thead>
        <tbody id="drinksTableBody"></tbody>
      </table>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="admin.js"></script>
</body>
</html>
